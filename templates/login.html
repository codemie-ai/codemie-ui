<!DOCTYPE html>
<html lang="en" charset="utf-8">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>Sign In</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Geist Mono', monospace;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #1a1a1a;
        color: white;
      }

      .gradient {
        position: absolute;
        bottom: 0;
        left: 0;
      }

      section {
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 10;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .logo__img {
        min-width: 39px;
      }

      .logo__text-1 {
        color: #c447eb;
        font-weight: 600;
        font-size: 12px;
      }

      .logo__text-2 {
        font-weight: 600;
        font-size: 17px;
      }

      form {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .title {
        margin-top: 48px;
        font-size: 18px;
        font-weight: 700;
      }

      .description {
        color: #bbbbbb;
        margin-top: 16px;
        font-size: 14px;
      }

      button {
        margin-top: 48px;
        padding: 0 8px;
        height: 28px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 12px;
        cursor: pointer;
        color: white;
        position: relative;
        border: none;
        border: 1px solid transparent;
        background: linear-gradient(#20222e, #20222e) padding-box,
          linear-gradient(90deg, #993ec7, #547ccc) border-box;
      }

      button:hover {
        background: linear-gradient(#262941, #262941) padding-box,
          linear-gradient(90deg, #993ec7, #547ccc) border-box;
      }
    </style>
  </head>
  <body>
    <img
      src="https://github.com/epam-gen-ai-run/ai-run-install/blob/main/docs/assets/ai/login_gradient.png?raw=true"
      class="gradient"
      alt=""
    />
    <section>
      <div class="logo">
        <img
          src="https://raw.githubusercontent.com/epam-gen-ai-run/ai-run-install/d190dda39c72cc863d18d63bb8fd04bf91352437/docs/assets/ai/login_logo.svg"
          class="logo__img"
          alt="Codemie logo"
        />
        <div class="logo__box">
          <p class="logo__text-1">EPAM AI/Run</p>
          <p class="logo__text-2">CodeMie</p>
        </div>
      </div>
      <form method="GET" action="/oauth2/start">
        <input type="hidden" name="rd" value="/" />
        <h1 class="title">Welcome to EPAM AI/RUN Codemie!</h1>
        <p class="description">Sign in with SSO to begin creating and exploring.</p>
        <button type="submit" class="button">Login with EPAM SSO</button>
      </form>
    </section>
  </body>
</html>
